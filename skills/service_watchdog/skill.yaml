name: service_watchdog
version: 1.0.0
description: 执行 service_watchdog.py，持续检测端口或进程状态
triggers:
  - "service_watchdog"
  - "端口监控"
  - "服务状态检测"
task_kind: managed
entry_script: scripts/managed/service_watchdog.py
timeout_seconds: 0
dependencies: []
default_args:
  - "--host"
  - "127.0.0.1"
  - "--port"
  - "7001"
  - "--interval"
  - "3"
  - "--max-failures"
  - "3"
args_schema:
  - flag: "--host"
    type: string
    required: true
    pattern: '^[a-zA-Z0-9._:-]+$'
  - flag: "--port"
    type: integer
    required: true
    min: 1
    max: 65535
  - flag: "--interval"
    type: integer
    required: true
    min: 1
    max: 3600
  - flag: "--max-failures"
    type: integer
    required: true
    min: 1
    max: 100
  - flag: "--log-file"
    type: string
    required: false
    pattern: '^[a-zA-Z0-9._/\\:-]+$'
