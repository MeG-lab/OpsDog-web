name: service_watchdog
version: 1.0.0
description: 持续检测本地 7001 端口的可用性，适合作为托管任务能力验证
triggers:
  - "托管端口检测"
  - "持续检测服务状态"
  - "检查7001端口"
  - "service_watchdog"
task_kind: managed
entry_script: scripts/managed/service_watchdog.py
timeout_seconds: 0
dependencies: []
default_args:
  - "--host"
  - "127.0.0.1"
  - "--port"
  - "7001"
  - "--interval"
  - "3"
  - "--max-failures"
  - "3"
args_schema:
  - flag: "--host"
    type: string
    required: true
    pattern: '^[a-zA-Z0-9._:-]+$'
  - flag: "--port"
    type: integer
    required: true
    min: 1
    max: 65535
  - flag: "--interval"
    type: integer
    required: true
    min: 1
    max: 3600
  - flag: "--max-failures"
    type: integer
    required: true
    min: 1
    max: 100
  - flag: "--log-file"
    type: string
    required: false
    pattern: '^[a-zA-Z0-9._/\\:-]+$'
