name: aliyun_voice_query_call
version: 1.0.0
description: "根据 CallId 查询阿里云语音通知的通话结果"
triggers:
  - "查询通话结果"
  - "查询语音通知结果"
  - "查询callid"
  - "查询呼叫结果"
server_id: aliyun_voice_skill
tool_name: query_call
execution_mode: instant
task_kind: instant
entry_script: tools/script/instant/aliyun_voice_skill.py
timeout_seconds: 30
dependencies:
  - "ALIBABA_CLOUD_ACCESS_KEY_ID"
  - "ALIBABA_CLOUD_ACCESS_KEY_SECRET"
default_args:
  - "--call-id"
  - "example-call-id"
args_schema:
  - flag: "--call-id"
    type: string
    required: true
