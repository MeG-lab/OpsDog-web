services:
  opsdog:
    build: .
    container_name: opsdog
    ports:
      - "8788:8788"
    volumes:
      # 持久化运行态数据
      - ./server/data:/app/server/data
      # 环境变量
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - OPSDOG_SERVER_ORIGIN=http://0.0.0.0:8788
      - OPSDOG_WEB_ORIGIN=http://0.0.0.0:8788
      - NODE_ENV=production
